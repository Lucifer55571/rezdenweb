        .contact-header { text-align: right; font-size: 45px; margin-bottom: 60px; }

        .contact-grid {

        .contact-item { text-align: center; width: 250px; }
        .contact-item .icon { font-size: 60px; margin-bottom: 15px; }
        .contact-item p { font-size: 14px; font-weight: bold; color: #4b5563; }
    </style>

                <div class="icon">✉️</div>

            </div>
            <div class="contact-item">
