<!DOCTYPE html>
<html lang="id">
<head>

    <title>Log In</title>
    <link rel="stylesheet" href="style.css">

<body class="auth-page">
    <img src="asset/rezepool.jpg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;" alt="Background Image">
    
    <div class="auth-card" style="box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <h2>log<span>in</span></h2>

            <input type="text" placeholder="USERNAME / EMAIL" required>
            <input type="password" placeholder="PASSWORD" required>
            <button type="submit">LOGIN</button>
        </form>
        <a href="signup.html" style="display:block; margin-top:15px; font-size:12px; color:#6D28D9; text-decoration:none;">DONT HAVE AN ACCOUNT? SIGNUP</a>
    </div>

    <a href="index.html" style="position: fixed; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; color: #6D28D9; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">← Back</a>
</body>
</html>
