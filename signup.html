<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" style="background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2));">
    <img src="asset/denrezmc.jpg" style="position: fixed; top: 0; left: 0; width: 110%; height: 110%; object-fit: cover; z-index: -1;" alt="Background Image">
    
    <div class="auth-card" style="position: absolute; right: 10%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <h2>sign<span>up</span></h2>
        <p style="font-size: 12px; color: #6D28D9; margin-bottom: 15px;">CREATE ACCOUNT</p>
        <form>
            <input type="text" placeholder="USERNAME" required>
            <input type="email" placeholder="EMAIL" required>
            <input type="password" placeholder="PASSWORD" required>
            <button type="submit">SIGNUP</button>
        </form>
        <a href="signin.html" style="display:block; margin-top:15px; font-size:12px; color:#6D28D9; text-decoration:none;">ALREADY HAVE AN ACCOUNT? LOGIN</a>
    </div>

    <a href="index.html" style="position: fixed; top: 20px; left: 20px; background: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; color: #6D28D9; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">← Back</a>
</body>
</html>
